<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = "kensho_best_streak";
const QUIZ_KEY = "rv_kensho";
const Q_OPTIONS = [5, 10, 15, 20];
const BTN = "linear-gradient(135deg,#3b82f6,#1d4ed8)";

// 県章をSVGで描画（外部画像不要）
function Emblem({ char, bg, fg }) {
  return (
    <svg width="140" height="140" viewBox="0 0 140 140"
      style={{display:"block",margin:"0 auto",filter:"drop-shadow(0 4px 8px rgba(0,0,0,0.15))"}}>
      {/* 六角形の背景 */}
      <polygon points="70,8 126,39 126,101 70,132 14,101 14,39"
        fill={bg} stroke="rgba(255,255,255,0.3)" strokeWidth="2"/>
      {/* 内側の輪 */}
      <polygon points="70,22 112,46 112,94 70,118 28,94 28,46"
        fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth="1.5"/>
      {/* 漢字 */}
      <text x="70" y="88" textAnchor="middle"
        fontSize="54" fontWeight="900" fill={fg}
        fontFamily="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        style={{letterSpacing:0}}>
        {char}
      </text>
    </svg>
  );
}

function pickProblems(diff, total) {
  let bank = diff === "mix" ? [...KENSHO_BANK]
    : KENSHO_BANK.filter(p => p[1] === diff);
  if (bank.length === 0) bank = [...KENSHO_BANK];

  const pool = bank.map(([name, region, char, bg, fg, exp]) => {
    const sameRegion = KENSHO_BANK.filter(p => p[0] !== name && p[1] === region).map(p => p[0]);
    const others = ALL_PREFS.filter(p => p !== name && !sameRegion.includes(p));
    const wrongPool = shuffle([...sameRegion, ...others]);
    const wrongs = wrongPool.slice(0, 3);
    const opts = shuffle([name, ...wrongs]);
    return {
      color:bg, title:"県章はどの都道府県？",
      word:name, char, bg, fg, region, exp,
      question:"この県章はどの都道府県のものですか？",
      options:opts, answer:opts.indexOf(name),
      explanation:`【${name}】${region}\n${exp}`,
    };
  });

  const shuffled = shuffle(pool);
  const result = [];
  const used = new Set();
  while (result.length < total) {
    const idx = Math.floor(Math.random() * shuffled.length);
    if (!used.has(idx) || shuffled.length < total) {
      used.add(idx);
      result.push({...shuffled[idx]});
    }
  }
  return result;
}

function SelectAnswer({ problem, checked, userAnswer, onAnswer }) {
  return (
    <div className="select-grid">
      {problem.options.map((opt, i) => {
        let cls = "select-btn";
        if (checked) {
          if (i === problem.answer) cls += " show-correct";
          else if (i === userAnswer) cls += " wrong";
        }
        return (
          <button key={i} className={cls} onClick={() => !checked && onAnswer(i)}>
            <span style={{color:"#6b7280",marginRight:"8px",fontWeight:"normal"}}>{"①②③④"[i]}</span>
            {opt}
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [mode,setMode]         = useState("setup");
  const [reviewBank,setReviewBank] = useState([]);
  const [diff,setDiff]         = useState("mix");
  const [totalQ,setTotalQ]     = useState(10);
  const [problems,setProblems] = useState([]);
  const [current,setCurrent]   = useState(0);
  const [score,setScore]       = useState(0);
  const [streak,setStreak]     = useState(0);
  const [best,setBest]         = useState(0);
  const [checked,setChecked]   = useState(false);
  const [userAnswer,setUserAnswer] = useState(null);
  const [celeb,setCeleb]       = useState(false);
  const [isCorrect,setIsCorrect] = useState(false);

  useEffect(() => {
    try { const s=localStorage.getItem(STORAGE_KEY); if(s) setBest(parseInt(s)||0); } catch(_) {}
    setReviewBank(JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]'));
  }, []);
  const saveBest = v => { try { localStorage.setItem(STORAGE_KEY,String(v)); } catch(_) {} };

  const startReview = () => {
    const bank = JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');
    setReviewBank(bank);
    if (bank.length === 0) { setMode("setup"); return; }
    const reshuffled = bank.map(p => {
      const correctOpt = p.options[p.answer];
      const opts = shuffle([...p.options]);
      return {...p, options:opts, answer:opts.indexOf(correctOpt)};
    });
    setProblems(reshuffled);
    setCurrent(0); setScore(0); setStreak(0);
    setChecked(false); setUserAnswer(null); setCeleb(false);
    setMode("review");
  };

  const startQuiz = () => {
    setProblems(pickProblems(diff, totalQ));
    setCurrent(0); setScore(0); setStreak(0);
    setChecked(false); setUserAnswer(null); setCeleb(false);
    setMode("quiz");
  };

  const problem = problems[current] || null;

  const handleAnswer = ans => {
    if (checked) return;
    setUserAnswer(ans); setChecked(true);
    const ok = ans === problem.answer;
    setIsCorrect(ok);
    if (ok) {
      setScore(s=>s+1); const ns=streak+1; setStreak(ns);
      if(ns>best){setBest(ns);saveBest(ns);}
      setCeleb(true); setTimeout(()=>setCeleb(false),1800);
      try{const b=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');const id=problem.word;const i=b.findIndex(x=>x._id===id);if(i>=0){b[i].ok=(b[i].ok||0)+1;if(b[i].ok>=5)b.splice(i,1);localStorage.setItem(QUIZ_KEY,JSON.stringify(b));}setReviewBank([...b]);}catch(_){}
    } else {
      setStreak(0);
      try{const b=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');const id=problem.word;if(!b.find(x=>x._id===id)){const s={...problem,_id:id,ok:0};b.push(s);localStorage.setItem(QUIZ_KEY,JSON.stringify(b));}setReviewBank([...b]);}catch(_){}
    }
  };

  const nextQuestion = () => {
    const _end = current+1 >= problems.length;
    if (_end && mode==="review") {
      const b=JSON.parse(localStorage.getItem(QUIZ_KEY)||'[]');
      setReviewBank([...b]);
      if(b.length>0){startReview();}else{setMode("graduated");}
      return;
    }
    if (_end) { setMode("result"); return; }
    setCurrent(c=>c+1);
    setChecked(false); setUserAnswer(null); setCeleb(false);
  };

  const progress = problem ? (current/problems.length)*100 : 0;

  const DIFF_OPTIONS = [
    {key:"mix",        emoji:"🗾", name:"全国ミックス",  desc:"47都道府県からランダム出題"},
    {key:"北海道・東北",emoji:"⛄", name:"北海道・東北",  desc:"北海道・青森・岩手・宮城・秋田・山形・福島"},
    {key:"関東",       emoji:"🗼", name:"関東",          desc:"茨城・栃木・群馬・埼玉・千葉・東京・神奈川"},
    {key:"中部",       emoji:"🗻", name:"中部",          desc:"新潟・富山・石川・福井・山梨・長野・岐阜・静岡・愛知"},
    {key:"近畿",       emoji:"⛩️", name:"近畿",          desc:"三重・滋賀・京都・大阪・兵庫・奈良・和歌山"},
    {key:"中国・四国", emoji:"🌊", name:"中国・四国",    desc:"鳥取・島根・岡山・広島・山口・徳島・香川・愛媛・高知"},
    {key:"九州・沖縄", emoji:"🌺", name:"九州・沖縄",    desc:"福岡・佐賀・長崎・熊本・大分・宮崎・鹿児島・沖縄"},
  ];

  if (mode === "graduated") return (
    <div className="setup-wrap" style={{background:"#f0f9ff"}}>
      <div className="setup-card">
        <div className="setup-emoji">{"🎓"}</div>
        <h2 className="setup-title" style={{color:"#1e3a8a"}}>{"復習バンク卒業！"}</h2>
        <p style={{fontSize:"14px",color:"#1d4ed8",marginBottom:"16px",fontWeight:"bold"}}>{"すべての県章を5回正解しました！"}</p>
        <div style={{background:"#dbeafe",borderRadius:"14px",padding:"16px",marginBottom:"16px",fontSize:"13px",color:"#1e3a8a",lineHeight:"1.8"}}>{"🌟 全県章マスター！"}</div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #1e40af"}} onClick={()=>setMode("setup")}>{"もどる"}</button>
      </div>
    </div>
  );

  if (mode === "setup") return (
    <div className="setup-wrap" style={{background:"#f0f9ff"}}>
      <div className="setup-card">
        <div style={{textAlign:"center",marginBottom:"12px",fontSize:"12px"}}>
          <a href="https://shoi141.github.io/shakai-quiz/" style={{color:"#adb5bd",textDecoration:"none"}}>← 社会トップ</a>
          {"　|　"}
          <a href="https://shoi141.github.io/quiz-portal/" style={{color:"#adb5bd",textDecoration:"none"}}>🏠 教科トップ</a>
        </div>
        <div className="setup-emoji">🗾</div>
        <h1 className="setup-title" style={{color:"#1e3a8a"}}>県章クイズ</h1>
        <p className="setup-sub">47都道府県の県章を覚えよう！</p>
        <div style={{marginBottom:"16px"}}>
          <button onClick={()=>{if(reviewBank.length>0)startReview();}}
            style={{width:"100%",padding:"14px 16px",borderRadius:"14px",cursor:reviewBank.length>0?"pointer":"default",border:reviewBank.length>0?"2px solid #ef4444":"2px solid #e5e7eb",background:reviewBank.length>0?"#fef2f2":"#f9fafb",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:"900",fontSize:"15px",color:reviewBank.length>0?"#b91c1c":"#374151"}}>{"📚 復習モード"}</div>
              {reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",marginTop:"2px"}}>{"タップして今すぐ開始！"}</div>}
            </div>
            <span style={{background:reviewBank.length>0?"#ef4444":"#d1d5db",color:"#fff",borderRadius:"99px",padding:"4px 12px",fontSize:"13px",fontWeight:"bold"}}>
              {reviewBank.length>0?reviewBank.length+"県":"なし"}
            </span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>{"間違えた県章が溜まるとここで復習できます"}</div>}
        </div>
        {best>0&&<div className="best-badge" style={{background:"#dbeafe",border:"1.5px solid #93c5fd",color:"#1e3a8a"}}>🏆 最高連続記録：<strong>{best}問</strong></div>}
        <div className="qcount-section">地方を選ぶ</div>
        <div className="diff-btn-row">
          {DIFF_OPTIONS.map(d=>(
            <button key={d.key} className="diff-card-btn"
              style={{background:diff===d.key?"#dbeafe":"#f9fafb",border:diff===d.key?"2px solid #3b82f6":"2px solid #e5e7eb",boxShadow:diff===d.key?"0 3px 0 #3b82f6":"none"}}
              onClick={()=>setDiff(d.key)}>
              <span style={{fontSize:"22px"}}>{d.emoji}</span>
              <div>
                <div className="diff-name" style={{color:diff===d.key?"#1e3a8a":"#1f2937"}}>{d.name}</div>
                <div className="diff-desc">{d.desc}</div>
              </div>
              {diff===d.key&&<span style={{marginLeft:"auto",fontSize:"18px"}}>✅</span>}
            </button>
          ))}
        </div>
        <div className="qcount-section">何問やる？</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?"2px solid #3b82f6":"2px solid #dee2e6",background:totalQ===n?"#3b82f6":"#f8f9fa",color:totalQ===n?"#fff":"#495057",boxShadow:totalQ===n?"0 3px 0 #1d4ed8":"none"}}
              onClick={()=>setTotalQ(n)}>{n}問</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #1e40af"}} onClick={startQuiz}>スタート！ 🚀</button>
      </div>
    </div>
  );

  if (mode === "result") {
    const pct = Math.round((score/problems.length)*100);
    return (
      <div className="setup-wrap" style={{background:"#f0f9ff"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
          <h2 className="setup-title" style={{color:"#1e3a8a"}}>おわり！</h2>
          <p className="result-score">{problems.length}問中 <span className="result-big" style={{color:"#3b82f6"}}>{score}</span> 問正解</p>
          <div className="pct-bar-bg" style={{background:"#dbeafe"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">この回の最高連続</div><div className="streak-result-val" style={{color:"#ef4444"}}>🔥 {streak}問</div></div>
            <div className="streak-result-box"><div className="streak-result-label">歴代最高連続</div><div className="streak-result-val" style={{color:"#f59f00"}}>🏆 {best}問</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #1e40af"}} onClick={startQuiz}>もう一度</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>設定へ</button>
          </div>
          {reviewBank.length>0&&(
            <button className="start-btn"
              style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:"0 4px 0 #991b1b",marginTop:"8px",width:"100%"}}
              onClick={startReview}>{"続けて復習する 📚 ("}{reviewBank.length}{"県)"}</button>
          )}
        </div>
      </div>
    );
  }

  if (!problem) return null;

  return (
    <div className="rika-root">
      {celeb&&(
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">🎉</div>
            <div className="celeb-text" style={{color:"#1e3a8a"}}>せいかい！</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#3b82f6"}}>🔥 {streak}れんぞく！</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>🏆 新記録！</div>}
          </div>
        </div>
      )}
      <div className="quiz-header">
        <button className="back-btn" onClick={()=>setMode("setup")}>← もどる</button>
        <span className="q-label">Q{current+1}<span className="q-total">/{problems.length}</span></span>
        <span className="streak-badge">🔥{streak}</span>
      </div>
      <div className="progress-bar-bg">
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>
      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        <div style={{fontWeight:"900",fontSize:"12px",color:problem.color,marginBottom:"6px"}}>{problem.title}</div>
        <div className="emblem-wrap">
          <Emblem char={problem.char} bg={problem.bg} fg={problem.fg}/>
        </div>
        <div style={{textAlign:"center",marginBottom:"12px"}}>
          <span className="region-tag">{problem.region}</span>
        </div>
        <SelectAnswer problem={problem} checked={checked} userAnswer={userAnswer} onAnswer={handleAnswer}/>
      </div>
      {checked&&(
        <>
          <div style={{textAlign:"center",fontSize:"18px",fontWeight:"900",color:isCorrect?"#10b981":"#ef4444"}}>
            {isCorrect?"⭕ 正解！":"❌ 不正解"}
          </div>
          <div className="explanation-card">
            <div style={{fontWeight:"900",marginBottom:"4px",fontSize:"12px",color:"#92400e"}}>💡 解説</div>
            {problem.explanation.split("\n").map((line,i)=><div key={i}>{line}</div>)}
          </div>
          <button className="next-btn" style={{background:BTN,color:"#fff",boxShadow:"0 4px 0 #1e40af"}} onClick={nextQuestion}>
            {current+1>=problems.length?"結果を見る 🎉":"つぎへ →"}
          </button>
        </>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
